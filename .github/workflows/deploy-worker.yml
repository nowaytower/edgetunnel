name: Deploy Worker

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - '_worker.js'
  workflow_dispatch:

concurrency:
  group: deploy-worker-cmliutun
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Deploy cmliutun to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy _worker.js --no-bundle --name cmliutun --compatibility-date 2025-11-04 --keep-vars
